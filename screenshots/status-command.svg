<svg viewBox="0 0 680 220" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono', 'Fira Code', 'Menlo', monospace">
  <!-- Terminal window -->
  <rect width="680" height="220" rx="10" fill="#1a1a1a" stroke="#333" stroke-width="1"/>

  <!-- Title bar -->
  <rect width="680" height="36" rx="10" fill="#252525"/>
  <rect y="26" width="680" height="10" fill="#252525"/>
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#febc2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>
  <text x="340" y="23" text-anchor="middle" fill="#888" font-size="12">zsh — ~</text>

  <!-- Prompt + command -->
  <text x="20" y="65" fill="#22d3ee" font-size="13">~</text>
  <text x="37" y="65" fill="#888" font-size="13"> $ </text>
  <text x="67" y="65" fill="#e5e5e5" font-size="13">npx contextspin status</text>

  <!-- Output line 1: engine info -->
  <text x="20" y="91" fill="#a3a3a3" font-size="12">Engine: daemonless · 3 sources · last refresh 4m ago</text>

  <!-- Blank line spacing -->

  <!-- Snippet 1: weather -->
  <text x="20" y="117" fill="#6ee7b7" font-size="13">•</text>
  <text x="34" y="117" fill="#e5e5e5" font-size="13">🌤️ Dubai, AE: ☀️ +33°C</text>

  <!-- Snippet 2: joke -->
  <text x="20" y="141" fill="#6ee7b7" font-size="13">•</text>
  <text x="34" y="141" fill="#e5e5e5" font-size="13">😄 Why do programmers prefer dark mode? Because light attracts bugs.</text>

  <!-- Snippet 3: HN -->
  <text x="20" y="165" fill="#6ee7b7" font-size="13">•</text>
  <text x="34" y="165" fill="#e5e5e5" font-size="13">📰 HN: Swiss parliament lifts ban on new nuclear power plants</text>

  <!-- Next prompt -->
  <text x="20" y="199" fill="#22d3ee" font-size="13">~</text>
  <text x="37" y="199" fill="#888" font-size="13"> $ </text>
  <rect x="67" y="188" width="8" height="14" fill="#e5e5e5" opacity="0.7"/>
</svg>
