<svg viewBox="0 0 720 160" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono', 'Fira Code', 'Menlo', monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#141414"/>
    </linearGradient>
  </defs>

  <!-- Terminal window -->
  <rect width="720" height="160" rx="10" fill="url(#bg)" stroke="#333" stroke-width="1"/>

  <!-- Title bar -->
  <rect width="720" height="36" rx="10" fill="#252525"/>
  <rect y="26" width="720" height="10" fill="#252525"/>

  <!-- Traffic lights -->
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#febc2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>

  <!-- Window title -->
  <text x="360" y="23" text-anchor="middle" fill="#888" font-size="12">claude — ~/my-project</text>

  <!-- Claude Code chat area (simulated) -->
  <text x="20" y="62" fill="#666" font-size="11">  Claude ✦  Working on auth middleware refactor...</text>
  <text x="20" y="80" fill="#444" font-size="11">  ─────────────────────────────────────────────────────────</text>

  <!-- The statusline at bottom — this is what ContextSpin renders -->
  <!-- Status bar background -->
  <rect y="118" width="720" height="32" fill="#1e1e1e" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Left side: model info (Claude Code native) -->
  <text x="16" y="137" fill="#555" font-size="11">claude-opus-4-5 ·</text>

  <!-- ContextSpin snippet (cyan styled box) -->
  <!-- The ┃ chars and italic snippet text -->
  <text x="148" y="137" fill="#22d3ee" font-size="12" letter-spacing="0">┃</text>
  <text x="162" y="137" fill="#67e8f9" font-size="11" font-style="italic">🌤️ Dubai, AE: ☀️ +33°C</text>
  <text x="318" y="137" fill="#22d3ee" font-size="12">┃</text>

  <!-- separator -->
  <text x="334" y="137" fill="#444" font-size="11">·</text>

  <!-- Next snippet -->
  <text x="346" y="137" fill="#22d3ee" font-size="12">┃</text>
  <text x="360" y="137" fill="#67e8f9" font-size="11" font-style="italic">📰 HN: Swiss parliament lifts ban on nuclear</text>
  <text x="614" y="137" fill="#22d3ee" font-size="12">┃</text>

  <!-- Right side: token count (Claude Code native) -->
  <text x="634" y="137" fill="#555" font-size="11">· 2.4k</text>

  <!-- Label below -->
  <text x="360" y="155" text-anchor="middle" fill="#3a3a3a" font-size="10">▲ Claude Code statusline with ContextSpin snippets</text>
</svg>
