<svg viewBox="0 0 760 160" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono', 'Fira Code', 'Menlo', monospace" role="img"><title>Claude Code statusline with ContextSpin snippet</title>
  <rect width="760" height="160" rx="10" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <rect width="760" height="36" rx="10" fill="#252525"/>
  <rect y="26" width="760" height="10" fill="#252525"/>
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#febc2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>
  <text x="380" y="23" text-anchor="middle" fill="#888" font-size="12">claude — ~/my-project</text>

  <text x="20" y="62" fill="#555" font-size="11">  Claude ✦  Working on auth middleware refactor...</text>
  <text x="20" y="80" fill="#2e2e2e" font-size="11">  ──────────────────────────────────────────────────────────────────────</text>

  <!-- Status bar -->
  <rect y="118" width="760" height="32" fill="#1e1e1e" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Left: model label -->
  <text x="16" y="137" fill="#555" font-size="11">claude-opus-4-5  ·</text>

  <!-- ContextSpin snippet with comfortable pipe spacing -->
  <text x="156" y="137" fill="#22d3ee" font-size="13">┃</text>
  <text x="174" y="137" fill="#67e8f9" font-size="11" font-style="italic">🌤️  Dubai, AE: ☀️ +33°C</text>
  <text x="346" y="137" fill="#22d3ee" font-size="13">┃</text>

  <!-- Right: token count, anchored to right edge -->
  <text x="744" y="137" text-anchor="end" fill="#555" font-size="11">2.4k tokens</text>
</svg>
