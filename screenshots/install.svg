<svg viewBox="0 0 820 240" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono','Fira Code','Menlo',monospace" role="img"><title>The curl one-line install of ContextSpin</title>
  <rect width="820" height="240" rx="10" fill="#faf9f5" stroke="#e4e1d8" stroke-width="1"/>
  <rect width="820" height="34" rx="10" fill="#f1efe8"/>
  <rect y="24" width="820" height="10" fill="#f1efe8"/>
  <circle cx="20" cy="17" r="5.5" fill="#ec6a5e"/>
  <circle cx="39" cy="17" r="5.5" fill="#f4bf4f"/>
  <circle cx="58" cy="17" r="5.5" fill="#61c554"/>
  <text x="410" y="21" text-anchor="middle" fill="#a8a096" font-size="11.5">zsh — ~</text>

  <text x="20" y="64" font-size="13"><tspan fill="#3f8c82">~</tspan><tspan fill="#a8a096"> $ </tspan><tspan fill="#3a3a38">curl -fsSL https://raw.githubusercontent.com/mannutech/contextspin/main/install.sh | bash</tspan></text>

  <text x="20" y="90" fill="#9a9286" font-size="12">Installing ContextSpin…</text>

  <text x="20" y="114" font-size="13"><tspan fill="#2a9d8f">✓</tspan><tspan fill="#3a3a38">  Node.js 22.x detected</tspan></text>
  <text x="20" y="138" font-size="13"><tspan fill="#2a9d8f">✓</tspan><tspan fill="#3a3a38">  Config created → ~/.contextspin.json</tspan></text>
  <text x="20" y="162" font-size="13"><tspan fill="#2a9d8f">✓</tspan><tspan fill="#3a3a38">  Statusline wired (non-destructive)</tspan></text>
  <text x="20" y="186" font-size="13"><tspan fill="#2a9d8f">✓</tspan><tspan fill="#3a3a38">  SessionStart hook added to ~/.claude/settings.json</tspan></text>

  <text x="20" y="216" fill="#b07d2a" font-size="12">Restart Claude Code to see your statusline.</text>
</svg>
