<svg viewBox="0 0 680 230" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono', 'Fira Code', 'Menlo', monospace">
  <!-- Terminal window -->
  <rect width="680" height="230" rx="10" fill="#1a1a1a" stroke="#333" stroke-width="1"/>

  <!-- Title bar -->
  <rect width="680" height="36" rx="10" fill="#252525"/>
  <rect y="26" width="680" height="10" fill="#252525"/>
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#febc2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>
  <text x="340" y="23" text-anchor="middle" fill="#888" font-size="12">zsh — ~</text>

  <!-- Prompt + curl command (truncated) -->
  <text x="20" y="65" fill="#22d3ee" font-size="13">~</text>
  <text x="37" y="65" fill="#888" font-size="13"> $ </text>
  <text x="67" y="65" fill="#e5e5e5" font-size="13">curl -fsSL https://raw.githubusercontent.com/mannutech/contextspin/main/install.sh | bash</text>

  <!-- Output -->
  <text x="20" y="91" fill="#a3a3a3" font-size="12">Installing ContextSpin...</text>

  <!-- Check marks -->
  <text x="20" y="113" fill="#22c55e" font-size="13">✓</text>
  <text x="38" y="113" fill="#e5e5e5" font-size="13">Node.js 22.x detected</text>

  <text x="20" y="135" fill="#22c55e" font-size="13">✓</text>
  <text x="38" y="135" fill="#e5e5e5" font-size="13">Config created → ~/.contextspin.json</text>

  <text x="20" y="157" fill="#22c55e" font-size="13">✓</text>
  <text x="38" y="157" fill="#e5e5e5" font-size="13">Statusline wired (non-destructive)</text>

  <text x="20" y="179" fill="#22c55e" font-size="13">✓</text>
  <text x="38" y="179" fill="#e5e5e5" font-size="13">SessionStart hook added to ~/.claude/settings.json</text>

  <!-- Final message -->
  <text x="20" y="207" fill="#facc15" font-size="12">Restart Claude Code to see your statusline.</text>
</svg>
